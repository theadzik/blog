name: Build and Push Docker Image
on:
  push:
    tags:
      - "*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY_IMAGE: zmuda-pro-blog

jobs:
  build:
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: 'npm'
          cache-dependency-path: zmuda-pro/package-lock.json
      - name: Install dependencies
        working-directory: zmuda-pro
        run: npm ci
      - name: Run security audit
        working-directory: zmuda-pro
        run: |
          if ! npm audit --audit-level=high; then
            echo "::warning title=npm audit::Security audit reported high or higher vulnerabilities"
          fi
      - name: Build Docusaurus site
        working-directory: zmuda-pro
        run: npm run build
        env:
          NODE_ENV: production

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ vars.DOCKERHUB_USERNAME }}/${{ env.REGISTRY_IMAGE }}
      - name: Build and Push
        id: build-push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: "linux/amd64"
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      - name: Generate artifact attestation
        uses: actions/attest@v4
        with:
          subject-name: ${{ vars.DOCKERHUB_USERNAME }}/${{ env.REGISTRY_IMAGE }}
          subject-digest: ${{ steps.build-push.outputs.digest }}
          push-to-registry: true

      - name: Install Cosign
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Keyless sign image
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        run: |
          cosign sign --yes ${{ vars.DOCKERHUB_USERNAME }}/${{ env.REGISTRY_IMAGE }}@${{ steps.build-push.outputs.digest }}
