name: PR Quality Checks
on:
  pull_request:
    branches:
      - "main"
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.node-version'
          cache: 'npm'
          cache-dependency-path: zmuda-pro/package-lock.json

      - name: Install dependencies
        working-directory: zmuda-pro
        run: npm ci

      - name: Run security audit
        working-directory: zmuda-pro
        run: |
          if ! npm audit --audit-level=high; then
            echo "::warning title=npm audit::Security audit reported high or higher vulnerabilities"
          fi

      - name: Check for outdated packages
        working-directory: zmuda-pro
        run: npm outdated || true

      - name: Build site
        working-directory: zmuda-pro
        run: npm run build
        env:
          NODE_ENV: production

      - name: Check build output
        run: |
          if [ ! -d "zmuda-pro/build" ]; then
            echo "Build directory not found!"
            exit 1
          fi
          echo "✅ Build successful - output directory exists"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-output
          path: zmuda-pro/build
          retention-days: 1

  pre-commit:
    name: Pre-commit Checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Run pre-commit on all files
        run: pre-commit run --all-files --show-diff-on-failure

  docker-build-test:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: build-output
          path: zmuda-pro/build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build Docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          platforms: "linux/amd64"
          push: false
          tags: zmuda-pro-blog:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  summary:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs:
      - build-and-test
      - pre-commit
      - docker-build-test
    permissions: {}
    if: always()
    steps:
      - name: Check status
        run: |
          if [[ "${{ needs.build-and-test.result }}" != "success" ]] || \
             [[ "${{ needs.pre-commit.result }}" != "success" ]] || \
             [[ "${{ needs.docker-build-test.result }}" != "success" ]]; then
            echo "One or more checks failed!"
            exit 1
          fi
          echo "✅ All required checks passed!"
